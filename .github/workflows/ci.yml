name: CI

# Single pipeline: lint + tests + build on every push/PR, plus dependency and
# filesystem security scanning. Mirrors the sibling `agent` repo's CI canon,
# dropping the agent-specific Docker Hub publish and SSH deploy jobs (flock's
# release path lives in publish-telegram.yml).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Build dev-tools image
        run: task dev-tools:build

      - name: Lint
        run: task lint

      - name: Tests
        run: task tests

      - name: Build
        run: task build

  security-scan:
    name: Security & Dependency Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Build dev-tools image
        run: task dev-tools:build

      - name: Run govulncheck (Go vulnerability scanner)
        run: task security-scan

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          format: "table"

  image:
    name: Build telegram image (no push)
    runs-on: ubuntu-latest
    # PR-only dry run: prove the runtime image still builds before merge. The Go
    # lint/tests above never touch the Dockerfile, so a base-image/dependency bump
    # (e.g. a Node major) could land green here yet break the real build — which
    # otherwise only runs post-merge in publish-telegram.yml. This mirrors that
    # workflow's build EXACTLY (same context/file/platforms/cache) but with
    # push: false, so it catches multi-arch breakage (incl. the QEMU-emulated
    # arm64 path) on the PR. On push to main the actual publish covers it.
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build telegram image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./adapters/telegram/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  vk-image:
    name: Build vk image (no push)
    runs-on: ubuntu-latest
    # PR-only dry run: prove the VK runtime image still builds before merge, the same
    # way the telegram image job does (a base-image/dependency bump could land green in
    # the Go lint/tests yet break the Dockerfile, which otherwise only runs post-merge
    # in publish-vk.yml). Mirrors that workflow's build EXACTLY (same context/file/
    # platforms/cache) but with push: false. On push to main the actual publish covers it.
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build vk image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./adapters/vk/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
