[defaults]
# No default inventory — select an instance per run:
#   ansible-playbook -i inventories/<name>/inventory.ini playbook.yml
roles_path = roles
host_key_checking = False
interpreter_python = auto_silent
stdout_callback = yaml
# Uncomment to avoid typing the vault password every run:
# vault_password_file = .vault_pass

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=120s -o ServerAliveInterval=30 -o ServerAliveCountMax=10
