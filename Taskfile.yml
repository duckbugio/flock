version: '3'

silent: true

env:
  GOFLAGS: -buildvcs=false

vars:
  DEV_TOOLS: docker run --rm -e GOFLAGS -v "$PWD:/app" -w /app dev-tools

tasks:
  # ============================================================================
  # MAIN COMMANDS
  # ============================================================================
  default:
    cmds:
      - task: info
      - task: tidy
      - task: fmt
      - task: lint
      - task: tests
      - task: build

  # ============================================================================
  # INFORMATION
  # ============================================================================
  info:
    cmds:
      - echo "- Info"
      - "{{.DEV_TOOLS}} go version"

  # ============================================================================
  # GO DEPENDENCIES MANAGEMENT
  # ============================================================================
  tidy:
    cmds:
      - echo "- Tidy"
      - "{{.DEV_TOOLS}} go mod tidy"

  dev-tools:build:
    cmds:
      - echo "- Building dev-tools image"
      - docker build -t dev-tools -f ./tools/Dockerfile .

  # ============================================================================
  # DEVELOPMENT AND CODE QUALITY
  # ============================================================================
  fmt:
    cmds:
      - echo "- Format"
      - task: lint:cmd
        vars: { CLI_ARGS: "fmt ./..." }
      - task: lint:cmd
        vars: { CLI_ARGS: "run --fix --timeout=5m ./..." }

  lint:
    cmds:
      - echo "- Lint"
      - task: lint:cmd
        vars: { CLI_ARGS: "run --timeout=5m ./..." }

  lint:cmd:
    cmds:
      - "{{.DEV_TOOLS}} golangci-lint {{.CLI_ARGS}}"

  security-scan:
    cmds:
      - echo "- Security scan"
      - "{{.DEV_TOOLS}} go run golang.org/x/vuln/cmd/govulncheck@latest ./..."

  vet:
    desc: Static analysis via go vet.
    cmds:
      - echo "- go vet"
      - "{{.DEV_TOOLS}} go vet ./..."

  # ============================================================================
  # TESTING
  # ============================================================================
  tests:
    cmds:
      - echo "- Tests"
      - "{{.DEV_TOOLS}} go test -race ./..."

  tests:short:
    desc: Fast feedback loop — no race detector.
    cmds:
      - echo "- Tests (short, no -race)"
      - "{{.DEV_TOOLS}} go test -short ./..."

  # ============================================================================
  # BUILD
  # ============================================================================
  build:
    cmds:
      - echo "- Build"
      - "{{.DEV_TOOLS}} go build -o bin/flock-telegram ./cmd/flock-telegram"

  # ============================================================================
  # WEB (standalone marketing site, decoupled from the Go binary)
  # ============================================================================
  web:install:
    internal: true
    cmds:
      - npm --prefix web ci

  web:lint:
    desc: Lint and type-check the web app (eslint + prettier + tsc).
    cmds:
      - task: web:install
      - echo "- Web - lint"
      - npm --prefix web run lint

  web:test:
    desc: Run the web unit tests (vitest).
    cmds:
      - task: web:install
      - echo "- Web - test"
      - npm --prefix web test

  web:build:
    desc: Build the web production bundle.
    cmds:
      - task: web:install
      - echo "- Web - build"
      - npm --prefix web run build
